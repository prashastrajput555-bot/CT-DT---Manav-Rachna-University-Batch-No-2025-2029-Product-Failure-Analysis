<html lang="en">
<head>
<meta charset="UTF-8"/>

<title>Stakeholder Mapping – Task #09 | L&T EduTech</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0d0f14;
    --surface: #151820;
    --card: #1c2030;
    --border: #252a3a;
    --accent: #4f8ef7;
    --accent2: #f7a84f;
    --accent3: #4ff7a8;
    --accent4: #f74f8e;
    --accent5: #a84ff7;
    --text: #e8ecf4;
    --muted: #7a8099;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, #0a0c12 0%, #12162a 100%);
    border-bottom: 1px solid var(--border);
    padding: 28px 48px 24px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo-area { display: flex; align-items: center; gap: 16px; }
  .lt-badge {
    background: linear-gradient(135deg, #c8102e, #8b0d20);
    color: #fff; font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: 18px; padding: 8px 14px; border-radius: 8px; letter-spacing: 1px;
  }
  .header-title { font-family: 'Syne', sans-serif; font-size: 13px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
  .header-main { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; color: var(--text); }
  .task-badge {
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 18px; font-size: 13px; color: var(--accent); font-weight: 500; font-family: 'Syne', sans-serif;
  }

  /* ── Tabs ── */
  .tab-bar {
    display: flex; gap: 0; overflow-x: auto; background: var(--surface);
    border-bottom: 1px solid var(--border); padding: 0 48px;
    scrollbar-width: none;
  }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab {
    padding: 16px 22px; cursor: pointer; font-size: 13px; font-weight: 500;
    color: var(--muted); border-bottom: 3px solid transparent; transition: all .2s;
    white-space: nowrap; font-family: 'DM Sans', sans-serif;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab .num { display: inline-block; background: var(--border); border-radius: 4px; padding: 1px 7px; font-size: 11px; margin-right: 8px; font-family: 'Syne', sans-serif; font-weight: 700; }
  .tab.active .num { background: var(--accent); color: #fff; }

  /* ── Panel ── */
  .panels { padding: 36px 48px; }
  .panel { display: none; animation: fadeIn .3s ease; }
  .panel.active { display: block; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  .panel-header { margin-bottom: 32px; }
  .project-label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); font-family: 'Syne', sans-serif; margin-bottom: 8px; }
  .project-title { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; color: var(--text); }
  .project-subtitle { font-size: 14px; color: var(--muted); margin-top: 6px; }

  /* ── Two column layout ── */
  .panel-body { display: grid; grid-template-columns: 1fr 340px; gap: 28px; }
  @media (max-width: 900px) { .panel-body { grid-template-columns: 1fr; } .panels { padding: 24px 20px; } header { padding: 20px; flex-direction: column; gap: 12px; } }

  /* ── Power-Interest Grid ── */
  .grid-wrap { position: relative; background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; }
  .grid-title { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }
  .pi-grid {
    position: relative; width: 100%; aspect-ratio: 1.5/1;
    background:
      linear-gradient(to right, rgba(255,255,255,.03) 50%, transparent 50%),
      linear-gradient(to bottom, transparent 50%, rgba(255,255,255,.03) 50%);
    border: 1px solid var(--border); border-radius: 10px; overflow: visible;
  }
  /* Quadrant labels */
  .q-label {
    position: absolute; font-size: 10px; font-weight: 600; font-family: 'Syne', sans-serif;
    text-transform: uppercase; letter-spacing: 1.5px; opacity: .35; pointer-events: none;
  }
  .q-tl { top:10px; left:10px; color: #f74f8e; }
  .q-tr { top:10px; right:10px; color: #4ff7a8; text-align:right; }
  .q-bl { bottom:10px; left:10px; color: var(--muted); }
  .q-br { bottom:10px; right:10px; color: #f7a84f; text-align:right; }
  /* Axis labels */
  .axis-x { position: absolute; bottom: -26px; left: 50%; transform: translateX(-50%); font-size: 11px; color: var(--muted); font-family: 'Syne', sans-serif; letter-spacing: 1px; }
  .axis-y { position: absolute; left: -28px; top: 50%; transform: translateY(-50%) rotate(-90deg); font-size: 11px; color: var(--muted); font-family: 'Syne', sans-serif; letter-spacing: 1px; }
  .crosshair-h { position:absolute; top:50%; left:0; right:0; height:1px; background: var(--border); }
  .crosshair-v { position:absolute; left:50%; top:0; bottom:0; width:1px; background: var(--border); }
  /* Stakeholder bubble */
  .sh-bubble {
    position: absolute; transform: translate(-50%, -50%);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all .2s; z-index: 2;
    box-shadow: 0 0 0 2px rgba(255,255,255,.08);
  }
  .sh-bubble:hover { transform: translate(-50%,-50%) scale(1.15); z-index: 10; }
  .sh-bubble .inner { font-size: 9px; font-weight: 700; font-family: 'Syne', sans-serif; text-align: center; line-height: 1.2; padding: 4px; }
  .sh-label {
    position: absolute; font-size: 9.5px; font-family: 'DM Sans', sans-serif;
    font-weight: 500; color: var(--text); white-space: nowrap; pointer-events: none;
    background: rgba(13,15,20,.85); padding: 2px 6px; border-radius: 4px;
    top: calc(100% + 4px); left: 50%; transform: translateX(-50%);
    opacity: 0; transition: opacity .2s;
  }
  .sh-bubble:hover .sh-label { opacity: 1; }

  /* ── Stakeholder List ── */
  .sh-list { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
  .sh-item {
    display: flex; align-items: flex-start; gap: 12px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px;
  }
  .sh-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
  .sh-name { font-size: 13px; font-weight: 600; color: var(--text); font-family: 'Syne', sans-serif; }
  .sh-role { font-size: 11.5px; color: var(--muted); margin-top: 2px; line-height: 1.4; }

  /* ── Sidebar ── */
  .sidebar { display: flex; flex-direction: column; gap: 20px; }
  .info-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; }
  .info-card-title { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin-bottom: 14px; }
  .quadrant-legend { display: flex; flex-direction: column; gap: 10px; }
  .ql-item { display: flex; gap: 10px; align-items: flex-start; }
  .ql-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; margin-top: 3px; }
  .ql-name { font-size: 12px; font-weight: 600; color: var(--text); font-family: 'Syne', sans-serif; }
  .ql-sub { font-size: 11px; color: var(--muted); }
  .strategy-list { display: flex; flex-direction: column; gap: 8px; }
  .strat-item { font-size: 12.5px; color: var(--muted); line-height: 1.5; padding-left: 12px; border-left: 2px solid var(--border); }
  .strat-item strong { color: var(--text); }
</style>

function buildPanel(p, idx) {
  const accent = p.color;
  let bubblesHtml = p.stakeholders.map(s => {
    const size = 40 + Math.random() * 14 | 0;
    const label = s.label.replace(/\n/g,'<br>');
    return `<div class="sh-bubble" style="left:${s.x}%;top:${s.y}%;width:${size}px;height:${size}px;background:${s.color}22;border:2px solid ${s.color}88;">
      <span class="inner" style="color:${s.color};font-size:${size>48?9:8}px;">${s.id}</span>
      <div class="sh-label">${s.label.replace(/\n/,' ')} – ${s.role.split('–')[0].trim()}</div>
    </div>`;
  }).join('');

  let listHtml = p.stakeholders.map(s => `
    <div class="sh-item">
      <div class="sh-dot" style="background:${s.color}"></div>
      <div><div class="sh-name">${s.label.replace(/\n/,' ')}</div><div class="sh-role">${s.role}</div></div>
    </div>`).join('');

  let stratHtml = p.strategies.map(st => `
    <div class="ql-item">
      <div class="ql-dot" style="background:${st.color}"></div>
      <div><div class="ql-name">${st.q}</div><div class="ql-sub">${st.desc}</div></div>
    </div>`).join('');

  return `<div class="panel${idx===0?' active':''}" id="panel${idx}">
    <div class="panel-header">
      <div class="project-label">Project 0${idx+1}</div>
      <div class="project-title" style="color:${accent}">${p.title}</div>
      <div class="project-subtitle">${p.subtitle}</div>
    </div>
    <div class="panel-body">

            <div class="q-label q-bl">Monitor</div>
            <div class="q-label q-br">Keep<br>Informed</div>
            <div class="axis-x">INTEREST →</div>

      <div class="sidebar">
        <div class="info-card">
          <div class="info-card-title">Engagement Strategy</div>
          <div class="quadrant-legend">${stratHtml}</div>
        </div>
        <div class="info-card">
          <div class="info-card-title">How to read this map</div>
          <div class="strategy-list">
            <div class="strat-item"><strong>Top-right (Manage Closely):</strong> High power, high interest — core team, involve deeply</div>
            <div class="strat-item"><strong>Top-left (Keep Satisfied):</strong> High power, low interest — address needs, avoid surprises</div>
            <div class="strat-item"><strong>Bottom-right (Keep Informed):</strong> Low power, high interest — regular updates, build advocates</div>
            <div class="strat-item"><strong>Bottom-left (Monitor):</strong> Low power, low interest — minimal engagement, periodic check-ins</div>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

document.getElementById('panels').innerHTML = PROJECTS.map((p,i) => buildPanel(p,i)).join('');

function switchTab(idx) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  document.querySelectorAll('.panel').forEach((p,i) => p.classList.toggle('active', i===idx));
}
</script>
</body>
</html>
